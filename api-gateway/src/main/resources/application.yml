server:
  port: 8000

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: member-service-register
              uri: lb://MEMBER-SERVICE
              predicates:
                - Path=/member-service/members
                - Method=POST
            - id: member-service-login
              uri: lb://MEMBER-SERVICE
              predicates:
                - Path=/member-service/login
                - Method=POST
            - id: member-service
              uri: lb://MEMBER-SERVICE
              predicates:
                - Path=/member-service/**
                - Method=GET
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/member-service/(?<segment>.*), /$\{segment}
            - id: user-service-login
              uri: lb://MEMBER-SERVICE
              predicates:
                - Path=/user-service/login
                - Method=POST
            - id: catalog-service
              uri: lb://CATALOG-SERVICE
              predicates:
                - Path=/catalog-service/**
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order-service/**
