server:
  port: 0

spring:
  application:
    name: member-service
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
      path: /h2-console
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

  security:
    user:
      name: user
      password: $2a$10$bGY8xctj6sQJLEE60iWdzOSwLVBXqtgyBB7hAlBbNjRmH4S4n4DhW

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id}:${random.value}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka

token:
  secret: my-secret-key-for-jwt-token-that-should-be-long-enough-for-hmac-sha
  expiration_time: 86400000

greeting:
  message: Welcome to the Simple E - commerce.